<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Register</title>
<style>
body { 
  font-family: Arial, sans-serif; 
  background: #cce6ff; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  height: 100vh; 
  margin: 0;
}
.container { 
  background: #fff; 
  padding: 30px; 
  border-radius: 10px; 
  width: 350px; 
  box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
}
h1 { text-align: center; margin-bottom: 20px; }
label { display: block; margin-top: 10px; font-weight: bold; color: #333; }
input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; }
button { width: 100%; padding: 10px; margin-top: 20px; border: none; border-radius: 5px; background: #003366; color: #fff; cursor: pointer; }
button:hover { background: #0056b3; }
.options { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 14px; }
.options a { text-decoration: none; color: #003366; }
.options a:hover { text-decoration: underline; }
.switch-form { text-align: center; margin-top: 15px; font-size: 14px; }
.switch-form a { color: #003366; cursor: pointer; text-decoration: none; }
.switch-form a:hover { text-decoration: underline; }
.hidden { display: none; }
</style>
</head>
<body>

<div class="container">

  <!-- LOGIN FORM -->
  <form id="loginForm">
    <h1>Login</h1>
    <label>Username</label>
    <input type="text" placeholder="Enter username">
    <label>Password</label>
    <input type="password" placeholder="Enter password">
    <div class="options">
      <label><input type="checkbox"> Remember Me</label>
      <a id="showForgot">Forgot Password?</a>
    </div>
    <button type="submit">Login</button>
    <p class="switch-form">Don't have an account? <a id="showRegister">Register</a></p>
  </form>

  <!-- REGISTER FORM -->
  <form id="registerForm" class="hidden">
    <h1>Register</h1>
    <label>Full Name</label><input type="text">
    <label>Email</label><input type="email">
    <label>Username</label><input type="text">
    <label>Password</label><input type="password">
    <label>Confirm Password</label><input type="password">
    <button type="submit">Register</button>
    <p class="switch-form">Already have an account? <a id="showLogin">Login</a></p>
  </form>

  <!-- FORGOT PASSWORD FORM -->
  <form id="forgotForm" class="hidden">
    <h1>Reset Password</h1>
    <label>New Password</label><input type="password" id="newPassword" placeholder="New password">
    <label>Confirm Password</label><input type="password" id="confirmPassword" placeholder="Confirm password">
    <button type="submit">Reset Password</button>
    <p class="switch-form">Back to <a id="backToLogin">Login</a></p>
  </form>

</div>

<script>
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');
const forgotForm = document.getElementById('forgotForm');

const showRegister = document.getElementById('showRegister');
const showLogin = document.getElementById('showLogin');
const showForgot = document.getElementById('showForgot');
const backToLogin = document.getElementById('backToLogin');

// Show register
showRegister.onclick = () => {
  loginForm.classList.add('hidden');
  registerForm.classList.remove('hidden');
};

//login
// Handle login form submission
loginForm.onsubmit = (e) => {
  e.preventDefault();
  // Here you could validate username/password if needed
  window.location.href = 'dashboard.html'; // Redirect to dashboard
};

// Show login
showLogin.onclick = () => {
  registerForm.classList.add('hidden');
  loginForm.classList.remove('hidden');
};

// Show forgot password
showForgot.onclick = () => {
  loginForm.classList.add('hidden');
  forgotForm.classList.remove('hidden');
};

// Back to login
backToLogin.onclick = () => {
  forgotForm.classList.add('hidden');
  loginForm.classList.remove('hidden');
};

// Handle reset password
forgotForm.onsubmit = (e) => {
  e.preventDefault();
  const newPass = document.getElementById('newPassword').value;
  const confirmPass = document.getElementById('confirmPassword').value;
  if (newPass === confirmPass) {
    alert("Password reset successful!");
    forgotForm.classList.add('hidden');
    loginForm.classList.remove('hidden');
  } else {
    alert("Passwords do not match!");
  }
};
</script>

</body>
</html>
