<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Card Payment</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.payment-container{
    background:white;
    padding:30px;
    width:350px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#2ecc71;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#27ae60;
}

.back{
    margin-top:10px;
    background:#3498db;
}

.error{
    color:red;
    font-size:13px;
}
</style>
</head>

<body>

<div class="payment-container">
<h2>Credit Card Payment</h2>

<form onsubmit="processPayment(event)">

<input type="text" id="name" placeholder="Cardholder Name">
<div class="error" id="nameError"></div>

<input type="text" id="card" placeholder="Card Number" maxlength="16">
<div class="error" id="cardError"></div>

<input type="month" id="expiry">
<div class="error" id="expiryError"></div>

<input type="text" id="cvv" placeholder="CVV" maxlength="3">
<div class="error" id="cvvError"></div>

<input type="number" id="amount" placeholder="Amount ($)">
<div class="error" id="amountError"></div>

<button type="submit">Pay Now</button>

</form>

<button class="back" onclick="goBack()">Back</button>

</div>

<script>

function processPayment(event){
event.preventDefault();

let valid = true;

let name = document.getElementById("name").value.trim();
let card = document.getElementById("card").value.trim();
let expiry = document.getElementById("expiry").value;
let cvv = document.getElementById("cvv").value.trim();
let amount = document.getElementById("amount").value;

document.querySelectorAll(".error").forEach(e => e.innerText="");

/* Name validation */
if(!/^[A-Za-z ]+$/.test(name)){
document.getElementById("nameError").innerText="Enter a valid name";
valid=false;
}

/* Card number validation */
if(!/^\d{16}$/.test(card)){
document.getElementById("cardError").innerText="Card number must be 16 digits";
valid=false;
}

/* Expiry validation */
let today = new Date();
let expDate = new Date(expiry + "-01");

if(expiry === "" || expDate < today){
document.getElementById("expiryError").innerText="Card expiry date is invalid";
valid=false;
}

/* CVV validation */
if(!/^\d{3}$/.test(cvv)){
document.getElementById("cvvError").innerText="CVV must be 3 digits";
valid=false;
}

/* Amount validation */
if(amount <= 0 || amount === ""){
document.getElementById("amountError").innerText="Enter a valid amount";
valid=false;
}

if(valid){
alert("Payment Successful!");
}

}

function goBack(){
window.history.back();
}

</script>

</body>
</html>
