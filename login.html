<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#dceeff; /* page background */
}

.container{
  width:360px;
  padding:30px 25px;
  text-align:center;
  background:#E7F4FB; /* container color */
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
  margin-bottom:25px;
  font-weight:600;
}

.input-box{
  position:relative;
  margin-bottom:15px;
}

.input-box input{
  width:100%;
  padding:12px 40px 12px 15px;
  border-radius:25px;
  border:1px solid #cfd8e3;
  outline:none;
  font-size:14px;
  background:#fff;
}

.input-box i{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  color:#888;
}

.options{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:13px;
  margin-bottom:20px;
}

.options input{
  margin-right:5px;
}

.options a{
  text-decoration:none;
  color:#001B3D;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:#001B3D; /* exact button color */
  color:#fff;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#001530;
}

.register{
  margin-top:15px;
  font-size:13px;
}

.register a{
  text-decoration:none;
  font-weight:600;
  color:#001B3D;
}
</style>
</head>

<body>

<div class="container">
  <h2>Login</h2>

  <div class="input-box">
    <input type="text" placeholder="Username" id="username"/>
    <i class="fa-regular fa-user"></i>
  </div>

  <div class="input-box">
    <input type="password" placeholder="Password" id="password"/>
    <i class="fa-solid fa-lock"></i>
  </div>

  <div class="options">
    <label><input type="checkbox"/> Remember Me</label>
    <a href="#">Forgot Password?</a>
  </div>

  <button onclick="login()">Log In</button>

  <div class="register">
    Don't have an account? <a href="#">Register</a>
  </div>
</div>

<script>
function login(){
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if(user && pass){
    window.location.href = "Dashboard.html";
  }else{
    alert("Please fill all fields");
  }
}
</script>

</body>
</html>
