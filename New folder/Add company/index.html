<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Company</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<aside class="sidebar">

    <div class="sidebar-item" onclick="goTo('../dashboard.html')">
        <i data-lucide="layout-dashboard"></i> Dashboard
    </div>

    <div class="sidebar-item active" onclick="goTo('companies.html')">
        <i data-lucide="building-2"></i> Companies
    </div>

    <div class="sidebar-item" onclick="goTo('../subscriptions/subscriptions.html')">
        <i data-lucide="credit-card"></i> Subscriptions
    </div>

    <div class="sidebar-item" onclick="goTo('../staff/staff.html')">
        <i data-lucide="users"></i> Staff
    </div>

    <div class="sidebar-item" onclick="goTo('../reports/reports.html')">
        <i data-lucide="bar-chart-3"></i> Reports
    </div>

    <div class="sidebar-item" onclick="goTo('../settings/settings.html')">
        <i data-lucide="settings"></i> Settings
    </div>

    <div class="sidebar-footer">
        <div class="sidebar-item" onclick="goTo('../help/help.html')">
            <i data-lucide="help-circle"></i> Help & Support
        </div>
    </div>

</aside>

<main class="main-content">

<header class="header">

    <div class="search-container">
        <i data-lucide="search" class="search-icon"></i>
        <input type="text" placeholder="Search">
    </div>

    <div class="header-right">
    <div class="header-icons">
        <i data-lucide="bell"></i>
        <i data-lucide="user-circle"></i>
    </div>
    </div>

</header>

<section class="registration-form-container">

    <div class="form-header">
        <h2>Company Registration</h2>
        <p>Register your company to access the system</p>
    </div>

    <form class="multi-column-form">

        <h3 class="form-section-title">Company Information</h3>

        <div class="form-row">
            <div class="form-group">
                <label>Company Name*</label>
                <input type="text" placeholder="Enter company name">
            </div>

            <div class="form-group">
                <label>Email*</label>
                <input type="email" placeholder="Enter company email">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Registration Number*</label>
                <input type="text" placeholder="Registration number">
            </div>

            <div class="form-group">
                <label>Website URL*</label>
                <input type="url" placeholder="https://company.co.za">
            </div>
        </div>

        <div class="form-group">
            <label>Company Logo</label>
            <div class="upload-box">
                <i data-lucide="upload-cloud"></i>
                <span>Upload logo</span>
                <small>PNG, JPG up to 2MB</small>
                <input type="file" hidden>
            </div>
        </div>

        <h3 class="form-section-title">Administrator Details</h3>

        <div class="form-row">
            <div class="form-group">
                <label>First Name*</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Last Name*</label>
                <input type="text">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Email*</label>
                <input type="email">
            </div>

            <div class="form-group">
                <label>Phone Number*</label>
                <input type="tel">
            </div>
        </div>

        <div class="form-actions">

            <button type="button" class="btn-cancel" onclick="goTo('companies.html')">
                Cancel
            </button>

            <button type="button" class="btn-register" onclick="goTo('companies.html')">
                Register Company
            </button>

        </div>

    </form>

</section>

</main>

<script src="scripts.js"></script>

<script>
    function goTo(page) {
        window.location.href = page;
    }

    lucide.createIcons();
</script>

</body>
</html>
