<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Company</title>

<link rel="stylesheet" href="style.css">

<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900,400&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<div class="dashboard-container">

    <aside class="sidebar">

        <div class="sidebar-item" onclick="navigate('../dashboard/index.html')">
          <i data-lucide="layout-dashboard"></i> Dashboard
        </div>
      
        <div class="sidebar-item active" onclick="navigate('../companies/index.html')">
          <i data-lucide="building-2"></i> Companies
        </div>
      
        <div class="sidebar-item" onclick="navigate('../subscriptions/index.html')">
          <i data-lucide="credit-card"></i> Subscriptions
        </div>
      
        <div class="sidebar-item" onclick="navigate('../staff/index.html')">
          <i data-lucide="users"></i> Staff
        </div>
      
        <div class="sidebar-item" onclick="navigate('../reports/index.html')">
          <i data-lucide="bar-chart-3"></i> Reports
        </div>
      
        <div class="sidebar-item" onclick="navigate('../settings/index.html')">
          <i data-lucide="settings"></i> Settings
        </div>
      
        <div class="sidebar-footer">
          <div class="sidebar-item" onclick="navigate('../help/index.html')">
            <i data-lucide="help-circle"></i> Help & Support
          </div>
        </div>
      
        </aside>


<!-- MAIN -->
<main class="dashboard-main">

<header class="dashboard-header">

<div></div>

<div class="search-bar">
<i data-lucide="search"></i>
<input type="text" placeholder="Search">
</div>

<div class="header-icons">

<i data-lucide="bell"></i>

<div class="user-avatar">
L
</div>

</div>

</header>


<!-- FORM -->
<section class="registration-form-container">

<div class="form-header">

<h2>Company Registration</h2>
<p>Register your company to access JSE Analytics platform</p>

</div>


<form class="multi-column-form" id="companyForm">

<h3 class="form-section-title">Company Information</h3>

<div class="form-row">

<div class="form-group">
<label>Company Name*</label>
<input type="text" id="companyName" placeholder="Enter company name">
</div>

<div class="form-group">
<label>Email*</label>
<input type="email" id="companyEmail" placeholder="Enter company email">
</div>

</div>


<div class="form-row">

<div class="form-group">
<label>Registration Number*</label>
<input type="text" id="regNumber" placeholder="Registration number">
</div>

<div class="form-group">
<label>Website URL*</label>
<input type="url" id="website" placeholder="https://www.company.co.za">
</div>

</div>


<div class="form-group full-width">

<label>Company Logo</label>

<div class="upload-box" onclick="triggerUpload(this)">

<i data-lucide="upload-cloud"></i>
<span>Upload logo</span>
<small>PNG, JPG up to 2MB</small>

<input type="file" class="file-input" hidden accept="image/png, image/jpeg" onchange="handleFileSelect(this)">

</div>

</div>


<h3 class="form-section-title">Company Administrator Details</h3>

<div class="form-row">

<div class="form-group">
<label>First Name*</label>
<input type="text">
</div>

<div class="form-group">
<label>Last Name*</label>
<input type="text">
</div>

</div>


<div class="form-row">

<div class="form-group">
<label>Email*</label>
<input type="email">
</div>

<div class="form-group">
<label>Phone Number*</label>
<input type="tel">
</div>

</div>


<div class="form-actions">

    <button type="button" class="btn-cancel" onclick="goToCompanies()">
        Cancel
    </button>

 <button type="button" class="btn-register" onclick="goToCompanies()">
Register Company
</button>

</div>

</form>

</section>

</main>

</div>

<script src="./scripts.js"></script>

</body>
</html>
