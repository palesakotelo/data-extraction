<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Registration</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
width:420px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{text-align:center}

input, select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.form-section{
display:none;
}

.active{
display:block;
}

.success{
color:green;
text-align:center;
margin-top:10px;
}

.error{
color:red;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>User Registration</h2>

<select onchange="showForm(this.value)">
<option value="">Select Account Type</option>
<option value="admin">Admin</option>
<option value="company">Company</option>
<option value="user">End User</option>
</select>

<p id="message"></p>

<!-- ADMIN -->
<div id="admin" class="form-section">

<h3>Admin Registration</h3>

<input id="adminEmail" type="email" placeholder="Email">
<input id="adminPassword" type="password" placeholder="Password">
<input id="adminConfirm" type="password" placeholder="Confirm Password">

<button onclick="registerAdmin()">Register Admin</button>

</div>


<!-- COMPANY -->
<div id="company" class="form-section">

<h3>Company Registration</h3>

<input id="companyName" type="text" placeholder="Company Name">
<input id="companyEmail" type="email" placeholder="Company Email">
<input id="companyWebsite" type="text" placeholder="Website URL">
<input id="companyReg" type="text" placeholder="Registration Number">

<label>Upload Company Logo</label>
<input type="file">

<hr>

<input id="companyFirst" type="text" placeholder="First Name">
<input id="companyLast" type="text" placeholder="Last Name">
<input id="companyUserEmail" type="email" placeholder="Email">

<select id="companyGender">
<option>Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input id="companyPhone" type="text" placeholder="Phone Number">

<input id="companyPass" type="password" placeholder="Password">
<input id="companyConfirm" type="password" placeholder="Confirm Password">

<button onclick="registerCompany()">Register Company</button>

</div>


<!-- USER -->
<div id="user" class="form-section">

<h3>End User Registration</h3>

<input id="userFirst" type="text" placeholder="First Name">
<input id="userLast" type="text" placeholder="Last Name">

<input id="userEmail" type="email" placeholder="Email">

<select id="userGender">
<option>Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Upload Profile Photo</label>
<input type="file">

<input id="userPass" type="password" placeholder="Password">
<input id="userConfirm" type="password" placeholder="Confirm Password">

<button onclick="registerUser()">Register User</button>

</div>

<p style="text-align:center;margin-top:10px">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>


<script>

// show correct form
function showForm(type){

document.querySelectorAll(".form-section")
.forEach(f => f.classList.remove("active"))

if(type){
document.getElementById(type).classList.add("active")
}

}

// save users
function saveUser(user){

let users = JSON.parse(localStorage.getItem("users")) || []

// check duplicate email
if(users.find(u => u.email === user.email)){
showMessage("Email already registered","error")
return false
}

users.push(user)

localStorage.setItem("users", JSON.stringify(users))

showMessage("Registration successful! You can now login.","success")

return true
}

function showMessage(text,type){

let msg=document.getElementById("message")
msg.innerText=text
msg.className=type

}


// ADMIN
function registerAdmin(){

let email=document.getElementById("adminEmail").value
let pass=document.getElementById("adminPassword").value
let confirm=document.getElementById("adminConfirm").value

if(pass!==confirm){
showMessage("Passwords do not match","error")
return
}

saveUser({
role:"admin",
email:email,
password:pass
})

}


// COMPANY
function registerCompany(){

let email=document.getElementById("companyUserEmail").value
let pass=document.getElementById("companyPass").value
let confirm=document.getElementById("companyConfirm").value

if(pass!==confirm){
showMessage("Passwords do not match","error")
return
}

saveUser({
role:"company",
email:email,
password:pass
})

}


// USER
function registerUser(){

let email=document.getElementById("userEmail").value
let pass=document.getElementById("userPass").value
let confirm=document.getElementById("userConfirm").value

if(pass!==confirm){
showMessage("Passwords do not match","error")
return
}

saveUser({
role:"user",
email:email,
password:pass
})

}


let verificationPin = null;
let currentUser = null;

// modified saveUser function
function saveUser(user){
    let users = JSON.parse(localStorage.getItem("users")) || []

    if(users.find(u => u.email === user.email)){
        showMessage("Email already registered","error")
        return false
    }

    // instead of saving immediately, first generate verification PIN
    currentUser = user;
    verificationPin = Math.floor(100000 + Math.random()*900000); // 6-digit PIN

    showMessage(`A verification PIN has been sent to ${user.email}: ${verificationPin}`, "success") // simulate email
    showVerificationInput();
    return true
}

// show verification input
function showVerificationInput(){
    // create input dynamically
    let container = document.querySelector(".container");
    if(document.getElementById("pinSection")) return; // already exists

    let pinDiv = document.createElement("div");
    pinDiv.id = "pinSection";
    pinDiv.className = "form-section active";

    pinDiv.innerHTML = `
        <h3>Email Verification</h3>
        <p>Enter the 6-digit PIN sent to your email</p>
        <input id="pinInput" type="text" placeholder="Enter PIN">
        <button onclick="verifyPin()">Verify PIN</button>
        <p id="pinMessage"></p>
    `;

    container.appendChild(pinDiv);
}

// verify the entered PIN
function verifyPin(){
    let entered = document.getElementById("pinInput").value;
    let msg = document.getElementById("pinMessage");

    if(entered === verificationPin.toString()){
        // save to localStorage
        let users = JSON.parse(localStorage.getItem("users")) || [];
        users.push(currentUser);
        localStorage.setItem("users", JSON.stringify(users));

        msg.innerText = "Email verified! Registration complete.";
        msg.style.color = "green";

        // remove verification form after 2s
        setTimeout(() => {
            document.getElementById("pinSection").remove();
            showForm(""); // hide all forms
        }, 2000);
    } else {
        msg.innerText = "Incorrect PIN. Try again.";
        msg.style.color = "red";
    }
}
</script>

</body>
</html>
